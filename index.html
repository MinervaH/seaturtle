<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>綠蠵龜的海洋大冒險</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React 與 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 載入 Babel 以便在瀏覽器中編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden; /* 防止視窗出現捲軸 */
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- 注意這裡的 type 是 text/babel -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    function App() {
      // 遊戲狀態：'start' (開始畫面), 'playing' (遊戲中), 'gameover' (遊戲結束)
      const [gameState, setGameState] = useState('start');
      const [score, setScore] = useState(0);
      const [health, setHealth] = useState(5); // 生命值改為 5
      const [trashEaten, setTrashEaten] = useState(0); // 總共吃到的垃圾數量
      const [foodProgress, setFoodProgress] = useState(0); // 恢復愛心進度 (0-6)
      const [trashProgress, setTrashProgress] = useState(0); // 扣除愛心進度 (0-4)
      const [items, setItems] = useState([]);
      const [floatingTexts, setFloatingTexts] = useState([]);
      
      // 海龜位置 (使用百分比 0-100)
      const [turtlePos, setTurtlePos] = useState({ x: 15, y: 50 });
      const turtleRef = useRef({ x: 15, y: 50 }); 
      const trashRef = useRef(0); 
      const foodProgressRef = useRef(0);
      const trashProgressRef = useRef(0);
      const containerRef = useRef(null);

      // 遊戲畫面更新迴圈 (物理與碰撞)
      useEffect(() => {
        if (gameState !== 'playing') return;

        const gameLoop = setInterval(() => {
          setItems((currentItems) => {
            const nextItems = [];
            let healthChange = 0;
            let scoreChange = 0;
            let foodProgUpdate = null;
            let trashProgUpdate = null;
            const newTexts = [];
            const now = Date.now();

            currentItems.forEach((item) => {
              // 物品向左移動
              const nextX = item.x - item.speed;
              
              // 碰撞偵測 (計算海龜與物品的距離)
              const distX = nextX - turtleRef.current.x;
              // 因為螢幕比例，Y軸距離稍微調整權重讓碰撞更直覺
              const distY = item.y - turtleRef.current.y;
              const distance = Math.sqrt(distX * distX + distY * distY);
              
              // 碰撞判定半徑 (大約8%)
              const isCollided = distance < 8;

              if (isCollided) {
                if (item.type === 'food') {
                  // 成功率計算：每個垃圾扣 10% 成功率 (最低剩 10%)
                  const successRate = Math.max(0.1, 1 - (trashRef.current * 0.1));
                  if (Math.random() <= successRate) {
                    scoreChange += 2; // 吃到植物 +2
                    
                    // 處理植物恢復愛心進度
                    foodProgressRef.current += 1;
                    if (foodProgressRef.current >= 6) {
                      healthChange += 1; // 滿 6 個恢復 1 滴血
                      foodProgressRef.current -= 6; // 重置進度
                      newTexts.push({ id: now + Math.random(), text: '+1 ❤️', x: turtleRef.current.x, y: turtleRef.current.y - 12, color: 'text-pink-500 font-black text-3xl', createdAt: now });
                    }
                    foodProgUpdate = foodProgressRef.current;
                    
                    newTexts.push({ id: now + Math.random(), text: '+2', x: turtleRef.current.x, y: turtleRef.current.y, color: 'text-green-400', createdAt: now });
                  } else {
                    // 肚子垃圾太多吃失敗，不加分
                    newTexts.push({ id: now + Math.random(), text: '吃不下...', x: turtleRef.current.x, y: turtleRef.current.y, color: 'text-yellow-500 text-2xl', createdAt: now });
                  }
                } else if (item.type === 'trash') {
                  scoreChange -= 1; // 吃到垃圾 -1
                  
                  // 記錄總垃圾量 (用於影響體型與速度)
                  setTrashEaten(prev => {
                    const currentTrash = prev + 1;
                    trashRef.current = currentTrash;
                    return currentTrash;
                  });

                  // 處理垃圾扣除愛心進度
                  trashProgressRef.current += 1;
                  if (trashProgressRef.current >= 4) {
                    healthChange -= 1; // 滿 4 個扣 1 滴血
                    trashProgressRef.current -= 4; // 重置進度
                    newTexts.push({ id: now + Math.random(), text: '-1 ❤️', x: turtleRef.current.x, y: turtleRef.current.y - 12, color: 'text-red-600 font-black text-3xl', createdAt: now });
                  }
                  trashProgUpdate = trashProgressRef.current;

                  newTexts.push({ id: now + Math.random(), text: '-1', x: turtleRef.current.x, y: turtleRef.current.y, color: 'text-gray-600', createdAt: now });
                } else if (item.type === 'predator') {
                  scoreChange -= 3; // 遇到天敵 -3
                  healthChange -= 1; // 直接扣 1 滴血
                  newTexts.push({ id: now + Math.random(), text: '-1 ❤️', x: turtleRef.current.x, y: turtleRef.current.y - 12, color: 'text-red-600 font-black text-3xl', createdAt: now });
                  newTexts.push({ id: now + Math.random(), text: '-3', x: turtleRef.current.x, y: turtleRef.current.y, color: 'text-red-500', createdAt: now });
                }
                // 如果是 'neutral' (中立小魚)，什麼都不做，直接讓它消失(游走)
              } else if (nextX > -10) {
                // 沒撞到且還在畫面上，繼續保留
                nextItems.push({ ...item, x: nextX });
              }
            });

            // 狀態更新
            if (scoreChange !== 0) {
              setScore((s) => Math.max(0, s + scoreChange)); // 分數不低於 0
            }
            if (foodProgUpdate !== null) setFoodProgress(foodProgUpdate);
            if (trashProgUpdate !== null) setTrashProgress(trashProgUpdate);
            
            if (healthChange !== 0) {
              setHealth((h) => {
                // 最高不超過 5 顆愛心
                const newHealth = Math.min(5, h + healthChange);
                if (newHealth <= 0) {
                  setGameState('gameover');
                }
                return newHealth;
              });
            }

            if (newTexts.length > 0) {
              setFloatingTexts((prev) => [...prev, ...newTexts]);
            }

            return nextItems;
          });

          // 清理過期的漂浮文字 (保留 800 毫秒讓動畫播完)
          setFloatingTexts((prev) => prev.filter((ft) => Date.now() - ft.createdAt < 800));

        }, 50);

        return () => clearInterval(gameLoop);
      }, [gameState]);

      // 物品生成迴圈
      useEffect(() => {
        if (gameState !== 'playing') return;

        // 將生成時間從 1200 毫秒縮短到 700 毫秒，增加整體物品密集度
        const spawnInterval = setInterval(() => {
          const itemTypes = [
            // 大幅增加植物的比例
            { type: 'food', emoji: '🌿', name: '海草', speed: 1.2 },
            { type: 'food', emoji: '🌿', name: '海草', speed: 1.3 },
            { type: 'food', emoji: '🥬', name: '海藻', speed: 1.5 },
            { type: 'food', emoji: '🥬', name: '海藻', speed: 1.4 },
            { type: 'food', emoji: '🌿', name: '海草', speed: 1.6 },
            
            // 增加塑膠袋的比例，讓躲避變得更有挑戰性
            { type: 'trash', emoji: '🛍️', name: '塑膠袋', speed: 1.8 },
            { type: 'trash', emoji: '🛍️', name: '塑膠袋', speed: 2.0 },
            { type: 'trash', emoji: '🛍️', name: '塑膠袋', speed: 1.5 },

            // 維持天敵與干擾選項
            { type: 'predator', emoji: '🦈', name: '鯊魚', speed: 2.5 },
            { type: 'neutral', emoji: '🐟', name: '小魚', speed: 2.2 },
            { type: 'neutral', emoji: '🐠', name: '熱帶魚', speed: 2.0 },
            { type: 'neutral', emoji: '🐡', name: '河豚', speed: 1.6 }
          ];

          // 隨機選擇一種物品
          const randomType = itemTypes[Math.floor(Math.random() * itemTypes.length)];
          
          const newItem = {
            id: Math.random().toString(36).substr(2, 9),
            ...randomType,
            x: 110, // 從畫面右側外面出生
            y: 10 + Math.random() * 80 // 隨機高度 (10% ~ 90%)
          };

          setItems((prev) => [...prev, newItem]);
        }, 700); // 改為每 0.7 秒生成一個，提升密集度

        return () => clearInterval(spawnInterval);
      }, [gameState]);

      // 處理滑鼠與觸控移動
      const handlePointerMove = useCallback((e) => {
        if (gameState !== 'playing' || !containerRef.current) return;
        
        // 支援滑鼠與觸控
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const rect = containerRef.current.getBoundingClientRect();
        
        // 轉換為百分比 (限制在 0-100 範圍內)
        let x = ((clientX - rect.left) / rect.width) * 100;
        let y = ((clientY - rect.top) / rect.height) * 100;
        
        x = Math.max(5, Math.min(x, 95));
        y = Math.max(5, Math.min(y, 95));
        
        const newPos = { x, y };
        setTurtlePos(newPos);
        turtleRef.current = newPos;
      }, [gameState]);

      // 鍵盤控制 (上 下 左 右)
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (gameState !== 'playing') return;
          // 隨著垃圾吃越多，速度變越慢 (最少保有 1 的速度)
          const speed = Math.max(1, 5 - (trashRef.current * 0.4));
          let { x, y } = turtleRef.current;

          switch (e.key) {
            case 'ArrowUp': y = Math.max(5, y - speed); break;
            case 'ArrowDown': y = Math.min(95, y + speed); break;
            case 'ArrowLeft': x = Math.max(5, x - speed); break;
            case 'ArrowRight': x = Math.min(95, x + speed); break;
            default: return;
          }
          const newPos = { x, y };
          setTurtlePos(newPos);
          turtleRef.current = newPos;
        };

        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [gameState]);

      // 開始遊戲
      const startGame = () => {
        setScore(0);
        setHealth(5); // 初始為 5 顆愛心
        setTrashEaten(0);
        setFoodProgress(0);
        setTrashProgress(0);
        trashRef.current = 0;
        foodProgressRef.current = 0;
        trashProgressRef.current = 0;
        setItems([]);
        setFloatingTexts([]);
        setTurtlePos({ x: 15, y: 50 });
        turtleRef.current = { x: 15, y: 50 };
        setGameState('playing');
      };

      return (
        <div className="w-full h-screen bg-blue-50 flex items-center justify-center p-2 font-sans overflow-hidden select-none">
          
          {/* 專屬動畫樣式 */}
          <style>{`
            @keyframes floatUp {
              0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
              100% { transform: translate(-50%, -150%) scale(1.5); opacity: 0; }
            }
            .animate-float-up {
              animation: floatUp 0.8s ease-out forwards;
            }
          `}</style>

          {/* 遊戲主要容器 */}
          <div 
            ref={containerRef}
            className="relative w-full max-w-4xl h-[80vh] bg-gradient-to-b from-cyan-300 to-blue-600 rounded-3xl shadow-2xl overflow-hidden border-8 border-cyan-100 cursor-crosshair touch-none"
            onMouseMove={handlePointerMove}
            onTouchMove={handlePointerMove}
          >
            
            {/* 背景裝飾 (泡泡) */}
            <div className="absolute inset-0 pointer-events-none opacity-30">
              <div className="absolute bottom-0 left-[10%] text-white text-4xl animate-[ping_3s_ease-in-out_infinite]">⚪</div>
              <div className="absolute bottom-0 left-[50%] text-white text-2xl animate-[ping_4s_ease-in-out_infinite_1s]">⚪</div>
              <div className="absolute bottom-0 left-[80%] text-white text-3xl animate-[ping_5s_ease-in-out_infinite_2s]">⚪</div>
            </div>

            {/* --- 開始畫面 --- */}
            {gameState === 'start' && (
              <div className="absolute inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
                <div className="bg-white rounded-3xl p-8 max-w-lg text-center shadow-2xl transform transition-all relative">
                  
                  {/* 新增免登入標籤 */}
                  <div className="absolute -top-4 -right-2 md:-right-6 bg-yellow-400 text-yellow-900 text-lg font-black px-5 py-2 rounded-full shadow-lg transform rotate-12 border-4 border-white z-10 animate-pulse">
                    🆓 免登入直接玩
                  </div>

                  <div className="text-6xl mb-4">🐢</div>
                  <h1 className="text-3xl font-extrabold text-blue-600 mb-6 tracking-wide">綠蠵龜的海洋大冒險</h1>
                  
                  <div className="bg-blue-50 rounded-2xl p-4 mb-6 text-left">
                    <p className="text-lg text-gray-700 font-bold mb-3 text-center">怎麼玩？用手指滑動或滑鼠控制海龜！</p>
                    <ul className="space-y-3 text-lg font-medium text-gray-700">
                      <li className="flex items-start gap-3">
                        <span className="text-3xl mt-1">🌿</span> 
                        <span>吃<span className="text-green-600 font-bold">海草</span>會長大！(加 2 分。<strong className="text-pink-500">每吃 6 個可恢復 1 顆愛心！</strong>)</span>
                      </li>
                      <li className="flex items-center gap-3">
                        <span className="text-3xl">🦈</span> 
                        <span>小心<span className="text-red-500 font-bold">鯊魚</span> (扣 3 分、<strong className="text-red-500">扣 1 顆愛心</strong>)</span>
                      </li>
                      <li className="flex items-start gap-3">
                        <span className="text-3xl mt-1">🛍️</span> 
                        <span>不要吃<span className="text-gray-500 font-bold">塑膠袋</span>！ (扣 1 分。<strong className="text-red-500">每誤食 4 個扣 1 顆愛心！</strong>吃到 5 個以上體型變小、動作變慢且容易吃不下食物。)</span>
                      </li>
                      <li className="flex items-center gap-3">
                        <span className="text-3xl">🐠</span> 
                        <span><span className="text-blue-500 font-bold">各種小魚</span>只是鄰居，碰到沒關係！</span>
                      </li>
                    </ul>
                  </div>

                  <button 
                    onClick={startGame}
                    className="flex items-center justify-center gap-3 mx-auto bg-green-500 hover:bg-green-400 text-white text-3xl font-extrabold py-4 px-12 rounded-full shadow-[0_8px_0_rgb(21,128,61)] transform transition-all active:shadow-[0_0px_0_rgb(21,128,61)] active:translate-y-2 animate-bounce"
                  >
                    <span className="text-4xl drop-shadow-md">▶</span>
                    直接開始！
                  </button>
                </div>
              </div>
            )}

            {/* --- 遊戲進行中畫面 --- */}
            {gameState !== 'start' && (
              <>
                {/* 狀態列 (分數與生命) */}
                <div className="absolute top-4 left-4 right-4 flex flex-wrap justify-center md:justify-between items-center gap-2 z-40 pointer-events-none">
                  <div className="bg-white/90 px-4 py-2 rounded-full shadow-md border-2 border-green-200">
                    <span className="text-sm md:text-xl font-bold text-green-700">分數: {score}</span>
                  </div>
                  
                  <div className="flex gap-2">
                    {/* 植物進度條 */}
                    <div className="bg-white/90 px-3 py-2 rounded-full shadow-md border-2 border-green-200 flex items-center gap-1">
                      <span className="text-sm md:text-xl">🌿</span>
                      <span className="text-xs md:text-lg font-bold text-green-600">
                        {foodProgress} <span className="text-gray-400 text-xs">/ 6</span>
                      </span>
                    </div>

                    {/* 垃圾扣血進度條 */}
                    <div className="bg-white/90 px-3 py-2 rounded-full shadow-md border-2 border-gray-300 flex items-center gap-1">
                      <span className="text-sm md:text-xl">🛍️</span>
                      <span className={`text-xs md:text-lg font-bold ${trashProgress >= 3 ? 'text-red-500 animate-pulse' : 'text-gray-600'}`}>
                        {trashProgress} <span className="text-gray-400 text-xs">/ 4</span>
                      </span>
                    </div>
                  </div>

                  <div className="bg-white/90 px-3 py-2 rounded-full shadow-md flex gap-1 border-2 border-red-200">
                    {[...Array(5)].map((_, i) => (
                      <span key={i} className={`text-sm md:text-2xl transition-all ${i < health ? 'opacity-100' : 'opacity-20 grayscale'}`}>
                        ❤️
                      </span>
                    ))}
                  </div>
                </div>

                {/* 玩家海龜 */}
                <div 
                  className={`absolute text-5xl drop-shadow-lg ${trashEaten >= 5 ? 'opacity-80' : ''}`}
                  style={{ 
                    left: `${turtlePos.x}%`, 
                    top: `${turtlePos.y}%`,
                    // 吃到5個垃圾，體型縮小 (scale(0.7))
                    transform: `translate(-50%, -50%) scale(${trashEaten >= 5 ? 0.7 : 1})`,
                    // 垃圾越多，transition duration 越長，造成游動變慢的延遲感
                    transition: `left ${50 + trashEaten * 80}ms ease-out, top ${50 + trashEaten * 80}ms ease-out, transform 0.5s` 
                  }}
                >
                  🐢
                </div>

                {/* 掉落物品/敵人 */}
                {items.map(item => (
                  <div 
                    key={item.id}
                    className={`absolute text-4xl transform -translate-x-1/2 -translate-y-1/2 drop-shadow-md`}
                    style={{ 
                      left: `${item.x}%`, 
                      top: `${item.y}%`,
                      transition: 'left 50ms linear' 
                    }}
                  >
                    {item.emoji}
                  </div>
                ))}

                {/* 漂浮加扣分文字 */}
                {floatingTexts.map(ft => (
                  <div 
                    key={ft.id}
                    className={`absolute text-4xl font-black drop-shadow-lg z-50 animate-float-up ${ft.color}`}
                    style={{ left: `${ft.x}%`, top: `${ft.y}%` }}
                  >
                    {ft.text}
                  </div>
                ))}
              </>
            )}

            {/* --- 遊戲結束畫面 --- */}
            {gameState === 'gameover' && (
              <div className="absolute inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
                <div className="bg-white rounded-3xl p-8 max-w-xl text-center shadow-2xl animate-bounce-in">
                  <div className="text-6xl mb-2">{trashEaten >= 8 ? '😵' : '🐢💦'}</div>
                  <h2 className="text-4xl font-extrabold text-red-500 mb-2">
                    {trashEaten >= 8 ? '肚子塞滿塑膠垃圾了😭' : '遊戲結束'}
                  </h2>
                  <p className="text-2xl font-bold text-blue-700 mb-4">你的分數：{score} 分</p>
                  
                  <div className="bg-blue-50 rounded-2xl p-5 mb-6 border-2 border-blue-200 text-left">
                    <h3 className="text-xl font-bold text-blue-800 mb-3 text-center border-b-2 border-blue-200 pb-2">💡 綠蠵龜小知識 💡</h3>
                    <ul className="space-y-3 text-gray-700 text-lg">
                      <li className="flex items-start gap-2">
                        <span className="shrink-0">🌿</span>
                        <span><strong className="text-green-600">食物：</strong>成年的綠蠵龜是吃素的喔！牠們最喜歡吃海草和海藻。</span>
                      </li>
                      <li className="flex items-start gap-2">
                        <span className="shrink-0">🐠</span>
                        <span><strong className="text-blue-500">鄰居：</strong>雖然海裡有很多小魚，但海龜不吃魚，只跟牠們當好鄰居！</span>
                      </li>
                      <li className="flex items-start gap-2">
                        <span className="shrink-0">🛍️</span>
                        <span><strong className="text-gray-600">危機：</strong>海漂<strong className="text-red-500">塑膠袋</strong>看起來很像水母，海龜常會不小心吃下肚而生病。請大家一起減少使用塑膠袋！</span>
                      </li>
                    </ul>
                  </div>

                  <button 
                    onClick={startGame}
                    className="flex items-center justify-center gap-3 mx-auto bg-blue-500 hover:bg-blue-400 text-white text-3xl font-extrabold py-4 px-12 rounded-full shadow-[0_8px_0_rgb(30,58,138)] transform transition-all active:shadow-[0_0px_0_rgb(30,58,138)] active:translate-y-2"
                  >
                    <span className="text-4xl drop-shadow-md">🔄</span>
                    再玩一次！
                  </button>
                </div>
              </div>
            )}
            
          </div>
        </div>
      );
    }

    // 渲染 React 應用
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
